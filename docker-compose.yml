x-backend-cors-origins: &backend-cors-origins "http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://localhost:8082,http://localhost:8083,http://localhost:8084,http://user-service:8081,http://food-service:8082,http://cart-service:8083,http://payment-service:8084,http://api-gateway:8080,http://frontend:3000"

services:
  cart-service:
    build:
      context: ./cart-service
    image: cart-service:local
    environment:
      CORS_ALLOWED_ORIGINS: *backend-cors-origins
    ports:
      - "8083:8083"
    volumes:
      - cart_service_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-net

  user-service:
    build:
      context: ./user-service
    image: user-service:local
    environment:
      JWT_SECRET: local_dev_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: local_dev_refresh_secret
      JWT_REFRESH_EXPIRES_IN: 7d
      JWT_REFRESH_TTL_MS: 604800000
      JWT_REFRESH_COOKIE_NAME: mfos_refresh_token
      JWT_REFRESH_COOKIE_PATH: /api/users
      JWT_REFRESH_COOKIE_SAMESITE: lax
      JWT_REFRESH_COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: *backend-cors-origins
    ports:
      - "8081:8081"
    volumes:
      - user_service_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-net

  food-service:
    build:
      context: ./foodService
    image: food-service:local
    environment:
      CORS_ALLOWED_ORIGINS: *backend-cors-origins
    ports:
      - "8082:8082"
    volumes:
      - food_service_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-net

  payment-service:
    build:
      context: ./payment-notification-service
    image: payment-service:local
    environment:
      ORDER_SERVICE_URL: http://cart-service:8083/order
      CORS_ALLOWED_ORIGINS: *backend-cors-origins
    depends_on:
      cart-service:
        condition: service_started
    ports:
      - "8084:8084"
    volumes:
      - payment_service_db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-net

  api-gateway:
    build:
      context: ./api-gateway
    image: api-gateway:local
    environment:
      PORT: 8080
      JWT_SECRET: local_dev_secret
      USER_SERVICE_URL: http://user-service:8081
      FOOD_SERVICE_URL: http://food-service:8082
      ORDER_SERVICE_URL: http://cart-service:8083
      PAYMENT_SERVICE_URL: http://payment-service:8084
      CORS_ALLOWED_ORIGINS: *backend-cors-origins
    depends_on:
      user-service:
        condition: service_started
      food-service:
        condition: service_started
      cart-service:
        condition: service_started
      payment-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    image: frontend:local
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - app-net

volumes:
  cart_service_db_data:
  user_service_db_data:
  food_service_db_data:
  payment_service_db_data:

networks:
  app-net:
    driver: bridge
