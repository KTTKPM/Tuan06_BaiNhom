version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: food-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: food_service
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  food-service:
    build: .
    container_name: food-service-api
    depends_on:
      - mariadb
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/food_service?restrictedAuth=mysql_native_password
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"

volumes:
  mariadb_data:
